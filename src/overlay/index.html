<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mango overlay</title>
  </head>
  <body>
    <main class="overlay-shell" aria-label="mango voice">
      <section id="card" class="card" data-state="idle">
        <header class="card-head">
          <span id="dot" class="dot" aria-hidden="true"></span>
          <span id="state-label" class="state-label">idle</span>
        </header>
        <p id="user-line" class="line user" hidden>
          <span class="tag">you</span>
          <span id="user-text" class="text"></span>
        </p>
        <p id="reply-line" class="line reply" hidden>
          <span class="tag">mango</span>
          <span id="reply-text" class="text"></span>
        </p>
        <p id="hint-line" class="hint">hold on phone to talk</p>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
