<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <title>mango companion</title>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>mango</h1>
        <p id="status">connecting…</p>
      </header>
      <section class="youtube-auth" aria-label="YouTube account">
        <div>
          <h2>YouTube</h2>
          <p id="youtube-status">checking…</p>
        </div>
        <div class="youtube-actions">
          <button id="youtube-auth-start" type="button">connect</button>
          <button id="youtube-auth-disconnect" type="button">disconnect</button>
        </div>
        <div id="youtube-auth-code" class="youtube-code" hidden>
          <p>Open <a id="youtube-auth-link" href="#" target="_blank" rel="noreferrer">Google device login</a></p>
          <strong id="youtube-user-code"></strong>
        </div>
      </section>
      <section id="chat" class="chat-log" aria-live="polite" aria-label="chat"></section>
      <p id="error" class="error" hidden></p>
      <button id="ptt" type="button" aria-label="hold to talk">hold</button>
      <p class="hint">HTTPS required for phone mic</p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
