<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mango launcher</title>
  </head>
  <body style="margin:0;background:#050608">
    <main id="app" class="shell" aria-label="mango launcher">
      <section id="home-view" class="view">
        <header class="masthead">
          <p class="eyebrow">mango</p>
          <h1>What do you want to watch?</h1>
        </header>
        <section id="tiles" class="tiles" aria-label="Apps">
          <button class="tile" type="button" data-action="stremio">
            <span class="tile-kicker">Movies and shows</span>
            <span class="tile-title">Stremio</span>
          </button>
          <button class="tile" type="button" data-action="kodi">
            <span class="tile-kicker">Kodi add-on</span>
            <span class="tile-title">YouTube</span>
          </button>
          <button class="tile" type="button" data-action="settings">
            <span class="tile-kicker">System</span>
            <span class="tile-title">Settings</span>
          </button>
        </section>
        <p id="status" class="status" role="status">D-pad to move. B to select. ⌂ for home.</p>
      </section>

      <aside id="voice-hud" class="voice-hud" data-state="idle" aria-label="mango voice">
        <header class="voice-hud-head">
          <span id="voice-dot" class="voice-dot" aria-hidden="true"></span>
          <span id="voice-state" class="voice-state">mango</span>
        </header>
        <p id="voice-user-line" class="voice-line user" hidden>
          <span class="voice-tag">you</span>
          <span id="voice-user-text" class="voice-text"></span>
        </p>
        <p id="voice-reply-line" class="voice-line reply" hidden>
          <span class="voice-tag">mango</span>
          <span id="voice-reply-text" class="voice-text"></span>
        </p>
        <p id="voice-hint" class="voice-hint">hold on phone to talk</p>
      </aside>

      <section id="settings-view" class="view settings hidden" aria-label="Settings">
        <button id="back-button" class="back-button" type="button">Back</button>
        <header class="masthead">
          <p class="eyebrow">settings</p>
          <h1>Pi connection</h1>
        </header>
        <dl class="info-list">
          <div>
            <dt>Hostname</dt>
            <dd id="hostname">mango</dd>
          </div>
          <div>
            <dt>IP address</dt>
            <dd id="ip-address">10.0.0.174</dd>
          </div>
          <div>
            <dt>Launcher</dt>
            <dd id="launcher-url">http://10.0.0.174:3000</dd>
          </div>
          <div>
            <dt>Companion placeholder</dt>
            <dd id="companion-url">https://10.0.0.174:3001</dd>
          </div>
        </dl>
        <p class="settings-note">API keys arrive in Phase 2.</p>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
