<?xml version="1.0" encoding="UTF-8"?>
<!--
  mango icon — master 1024x1024 (draft v2, 2026-06-18).

  Composition: "alphonso profile"
    Indian mango side view — oblong/oblique, not a symmetric teardrop.
    Anatomy (stem end upper-right):
      - Full rounded base (ventral cheek is fuller)
      - Pinched waist (~mid-height)
      - Broad shoulder swell at stem (obtuse apex — no sharp beak)
      - Dorsal curve is flatter/shorter than ventral (asymmetry)

  Reference cultivar: Alphonso / Badami / Kesar family (oval-oblique,
  broad shoulders, rounded tip). NOT Totapuri parrot-beak — see
  icon-alternate-totapuri.svg for that variant.

  Studio: #0B0B12 canvas · amber #FFB300 · corona #FFD080 · dual halo
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="outer" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="42"/>
    </filter>
    <filter id="inner" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0B0B12"/>

  <!-- Alphonso-style profile: ventral (left) fuller, dorsal (right) flatter -->
  <path id="mango"
    d="M 502 878
       C 310 868, 200 740, 208 580
       C 216 450, 268 360, 352 315
       C 388 298, 428 275, 472 252
       C 512 232, 560 218, 608 212
       C 642 208, 672 218, 668 242
       C 660 278, 690 340, 708 430
       C 726 540, 708 680, 612 808
       C 562 858, 532 876, 502 878
       Z"/>

  <use href="#mango" fill="#FFD080" filter="url(#outer)" opacity="0.7"/>
  <use href="#mango" fill="#FFB300" filter="url(#inner)"/>
  <use href="#mango" fill="#FFB300"/>
</svg>
