    filter="url(#outer)" opacity="0.7"/>
  <path d="M 512 820
       C 512 820, 228 380, 188 280
       M 512 820
       C 512 820, 796 380, 836 280"
    stroke="#FFB300" stroke-width="40" stroke-linecap="round" fill="none"
    filter="url(#inner)"/>
  <path d="M 512 820
       C 512 820, 228 380, 188 280
       M 512 820
       C 512 820, 796 380, 836 280"
    stroke="#FFB300" stroke-width="40" stroke-linecap="round" fill="none"/>
