<?xml version="1.0" encoding="UTF-8"?>
<!-- var-10 pit ember: golden core + open crown arc (inverse of tir target) -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="outer" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="42"/>
    </filter>
    <filter id="inner" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <g opacity="0.7" filter="url(#outer)">
    <path d="M 248 520
         C 248 360, 368 240, 528 240
         C 688 240, 808 360, 808 520"
      stroke="#FFD080" stroke-width="52" stroke-linecap="round" fill="none"/>
    <circle cx="512" cy="600" r="96" fill="#FFD080"/>
  </g>
  <g filter="url(#inner)">
    <path d="M 248 520
         C 248 360, 368 240, 528 240
         C 688 240, 808 360, 808 520"
      stroke="#FFB300" stroke-width="40" stroke-linecap="round" fill="none"/>
    <circle cx="512" cy="600" r="84" fill="#FFB300"/>
  </g>
  <path d="M 248 520
       C 248 360, 368 240, 528 240
       C 688 240, 808 360, 808 520"
    stroke="#FFB300" stroke-width="40" stroke-linecap="round" fill="none"/>
  <circle cx="512" cy="600" r="84" fill="#FFB300"/>
</svg>
