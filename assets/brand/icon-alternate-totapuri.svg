<?xml version="1.0" encoding="UTF-8"?>
<!--
  mango icon - alternate Totapuri / parrot-beak profile (draft 2026-06-18).

  Distinctive South Indian processing mango: elongated body + hooked beak at
  the stem end. More graphic at small sizes; can read as bird if beak is long.

  Compare against icon-master.svg (Alphonso oblong, rounded apex).
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="outer" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="42"/>
    </filter>
    <filter id="inner" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0B0B12"/>

  <path id="mango"
    d="M 488 872
       C 340 860, 248 760, 238 620
       C 230 500, 278 400, 360 348
       C 400 322, 448 298, 488 278
       C 520 262, 548 248, 572 232
       C 596 216, 618 198, 642 172
       C 662 152, 678 158, 672 182
       C 664 212, 638 238, 618 262
       C 668 310, 712 400, 718 520
       C 724 660, 648 820, 488 872
       Z"/>

  <use href="#mango" fill="#FFD080" filter="url(#outer)" opacity="0.7"/>
  <use href="#mango" fill="#FFB300" filter="url(#inner)"/>
  <use href="#mango" fill="#FFB300"/>
</svg>
