services:
  aiometadata:
    image: ghcr.io/cedya77/aiometadata:latest
    container_name: mango-aiometadata
    restart: unless-stopped
    ports:
      - "127.0.0.1:3036:3232"
    env_file:
      - .env
    environment:
      PORT: "3232"
    volumes:
      - "${MANGO_AIOMETADATA_DATA_DIR:-/home/aman/.local/share/mango/aiometadata/data}:/app/addon/data"
    depends_on:
      aiometadata_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3232/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  aiometadata_redis:
    image: redis:7-alpine
    container_name: mango-aiometadata-redis
    restart: unless-stopped
    volumes:
      - "${MANGO_AIOMETADATA_REDIS_DIR:-/home/aman/.local/share/mango/aiometadata/redis}:/data"
    command: redis-server --appendonly yes --save 3600 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
