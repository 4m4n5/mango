# mango live TV rails — copy to /etc/mango/catalog-live.yaml on the Pi
#
# Mixes AREA69 (paid) + IPTV-org sports (free) via two NexoTV instances.
# verify_streams: false avoids NexoTV /stream/ rate limits; disk cache at ~/.cache/mango/

version: 2
cache_ttl_sec: 1800
verify_streams: false

sources:
  - addon: mango Live TV
    label: AREA69
    catalog: iptv_channels
    catalog_type: tv
    pages: 8
  - addon: mango Live Free
    label: free
    catalog: iptv_channels
    catalog_type: tv
    pages: 4
  - addon: mango Live News
    label: news
    catalog: iptv_channels
    catalog_type: tv
    pages: 1

rails:
  - id: live-cricket
    label: cricket
    keywords:
      - cricket
      - ipl
      - willow
      - star sports
      - bcci
      - ashes
    include_genres:
      - WT| WORLD CRICKET
      - WORLD CRICKET
      - ASIA| SPORTS
    exclude_keywords:
      - 24/7
      - replay
    limit: 12

  - id: live-football
    label: football & soccer
    keywords:
      - football
      - soccer
      - sport
      - premier league
      - epl
      - uefa
      - champions league
      - la liga
      - bundesliga
    include_genres:
      - US| PRIME
      - UK| SPORT
      - SOCCER PPV
      - EPL
      - UEFA
      - LA LIGA
      - LIVE FOOTBALL
    exclude_keywords:
      - replay
      - 24/7
    limit: 12

  - id: live-racing
    label: racing
    keywords:
      - formula 1
      - formula one
      - f1 tv
      - f1 channel
      - grand prix
      - motogp
      - moto gp
      - nascar
      - indycar
      - fanduel racing
      - floracing
      - rally tv
      - sky racing
      - racing.com
    include_genres:
      - FORMULA 1
      - F1 PPV
      - MOTOGP
      - NASCAR
    exclude_keywords:
      - replay
      - 24/7
      - news
    limit: 10

  - id: live-news
    label: news
    limit: 12
    source_fill:
      - addon: mango Live News
        limit: 12
        keywords:
          - republic tv
          - republic bharat
          - ndtv 24x7
          - ndtv india
          - aaj tak
          - times now news
          - times now navbharat
          - times now world
          - wion
          - zee news
          - india today
          - news18 india
          - abp news
          - dd news
          - mirror now
          - news nation
          - india tv
          - sansad tv
          - bharat samachar
    keywords:
      - news
    exclude_keywords:
      - replay
      - sport
