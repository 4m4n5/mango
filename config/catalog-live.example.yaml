# mango live TV rails — copy to /etc/mango/catalog-live.yaml on the Pi
#
# Curated free sports via mango Live Free M3U; AREA69 paid for live PPV events.
# verify_streams: false avoids NexoTV /stream/ rate limits; disk cache at ~/.cache/mango/

version: 2
cache_ttl_sec: 1800
verify_streams: false

sources:
  - addon: mango Live TV
    label: AREA69
    catalog: iptv_channels
    catalog_type: tv
    pages: 3
  - addon: mango Live Free
    label: free
    catalog: iptv_channels
    catalog_type: tv
    pages: 1
  - addon: mango Live News
    label: news
    catalog: iptv_channels
    catalog_type: tv
    pages: 1

rails:
  - id: live-cricket
    label: cricket
    limit: 7
    source_fill:
      - addon: mango Live Free
        limit: 7
        keywords:
          - star sports
          - willow
          - dd sports
          - cricket gold
    keywords:
      - cricket
    exclude_keywords:
      - replay
      - 24/7

  - id: live-football
    label: football & soccer
    limit: 12
    source_fill:
      - addon: mango Live TV
        limit: 10
        keywords:
          - world cup
        exclude_keywords:
          - prime
          - tubi
          - sitcom
          - news
          - crime
          - movie
      - addon: mango Live Free
        limit: 3
        keywords:
          - fifa+
          - bein sports usa
    keywords:
      - football
    exclude_keywords:
      - replay
      - 24/7
      - darts
      - handball
      - combat
      - storm football
      - pluto

  - id: live-racing
    label: racing
    limit: 7
    source_fill:
      - addon: mango Live TV
        limit: 2
        keywords:
          - f1 tv
          - nascar
        exclude_keywords:
          - tubi
      - addon: mango Live Free
        limit: 5
        keywords:
          - fanduel racing
          - floracing
          - rally tv
          - sky racing
    keywords:
      - racing
    exclude_keywords:
      - replay
      - 24/7
      - news

  - id: live-news
    label: news
    limit: 12
    source_fill:
      - addon: mango Live News
        limit: 12
        match_all: true
    keywords:
      - news
    exclude_keywords:
      - replay
      - sport
