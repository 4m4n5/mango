# mango live TV rails — copy to /etc/mango/catalog-live.yaml on the Pi
#
# Mixes AREA69 (paid) + IPTV-org sports (free) via two NexoTV instances.
# Only verified playable stream URLs appear in rails (skips rate-limit placeholders).

version: 2
cache_ttl_sec: 300
verify_streams: true
verify_pool_multiplier: 3
verify_delay_ms: 150

sources:
  - addon: mango Live TV
    label: AREA69
    catalog: iptv_channels
    catalog_type: tv
    pages: 2
  - addon: mango Live Free
    label: free
    catalog: iptv_channels
    catalog_type: tv
    pages: 1

rails:
  - id: live-cricket
    label: cricket
    keywords:
      - cricket
      - ipl
      - willow
      - star sports
      - bcci
      - ashes
    include_genres:
      - WORLD CRICKET
      - ASIA| SPORTS
    exclude_keywords:
      - 24/7
      - replay
    limit: 12

  - id: live-football
    label: football & soccer
    keywords:
      - premier league
      - epl
      - uefa
      - champions league
      - la liga
      - bundesliga
      - serie a
      - ligue 1
      - soccer
      - football
    include_genres:
      - SOCCER PPV
      - EPL
      - UEFA
      - LA LIGA
      - LIVE FOOTBALL
    exclude_keywords:
      - replay
      - 24/7
    limit: 12

  - id: live-f1
    label: formula 1
    keywords:
      - formula 1
      - formula one
      - f1 tv
      - grand prix
      - motogp
    include_genres:
      - FORMULA 1
      - F1 PPV
      - MOTOGP
    exclude_keywords:
      - replay
      - 24/7
    limit: 8
