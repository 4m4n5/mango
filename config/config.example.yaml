# Copy to /etc/ai-tv-box/config.yaml on the Pi

llm:
  provider: anthropic  # anthropic | openai
  model: claude-sonnet-4-20250514  # or gpt-4o, etc.
  api_key_file: /etc/ai-tv-box/llm.key

audio:
  input_mode: phone_websocket  # phone streams mic over LAN; no USB mic required
  whisper_model: base.en
  piper_voice: en_US-lessac-medium
  duck_volume_while_listening: true

launcher:
  autostart: true
  port: 3000
  return_key: Escape

overlay:
  enabled: true
  position: bottom-right

companion:
  port: 3001

remote:
  flirc_enabled: false
  gamepad_enabled: true
  phone_keys_via: xdotool  # X11 required

stremio:
  service_url: http://127.0.0.1:11470
  desktop_app: /usr/bin/stremio  # path after install
  credentials_file: /etc/ai-tv-box/stremio.json

kodi:
  host: 127.0.0.1
  port: 8080
  user: kodi
  password_file: /etc/ai-tv-box/kodi.key

tmdb:
  api_key_file: /etc/ai-tv-box/tmdb.key

orchestrator:
  host: 127.0.0.1
  port: 8765
