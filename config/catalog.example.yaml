# mango catalog rails — copy to /etc/mango/catalog.yaml on the Pi
#
# N2b: Movies | TV Shows tabs · 6 discover rails per tab.
# composite_list merges addon catalogs per theme (weighted, deduped).
# Sources: Cinemeta charts + AIOMetadata (mdblist + IndiaStreams custom catalogs).
#
# Rail catalog ids must exist in AIOMetadata manifest — sync via:
#   bash scripts/phase-n3d/aiometadata-config.sh import ~/.config/mango/aiometadata-import.json
# Mapping reference: config/aiometadata-rail-catalogs.json
#
# Future AI rails: type ai_catalog · static JSON pool · same playability path as addon rails
# (see config/ai-catalogs.example/ and scripts/phase-n3d/ai-catalog-refresh.sh).

version: 2

rails:
  # ── Movies tab ──────────────────────────────────────────────────────────────

  - id: movies-global-popular
    tab: movies
    label: popular worldwide
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: top, weight: 0.6 }
      - { addon: AIOMetadata, catalog: mdblist.88306, weight: 0.4 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: movies-india-trending
    tab: movies
    label: indian cinema
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: AIOMetadata, catalog: custom.in_rdata_indiastreams.movie.recmov, weight: 0.7 }
      - { addon: AIOMetadata, catalog: custom.in_rdata_indiastreams.movie.popmov, weight: 0.3 }
    playability:
      pool_target: 20
      ingest_multiplier: 6

  - id: movies-classics
    tab: movies
    label: highly rated
    type: addon_catalog
    addon: Cinemeta
    catalog: imdbRating
    content_type: movie
    limit: 20
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: movies-comedy
    tab: movies
    label: comedy & comfort
    type: addon_catalog
    addon: AIOMetadata
    catalog: mdblist.91223
    content_type: movie
    limit: 20
    playability:
      pool_target: 18
      ingest_multiplier: 6

  - id: movies-quick-watches
    tab: movies
    label: quick watches
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: AIOMetadata, catalog: mdblist.86934, weight: 0.65 }
      - { addon: AIOMetadata, catalog: mdblist.83668, weight: 0.35 }
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  - id: movies-documentaries
    tab: movies
    label: true stories
    type: addon_catalog
    addon: AIOMetadata
    catalog: mdblist.128051
    content_type: movie
    limit: 20
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  # ── TV Shows tab ────────────────────────────────────────────────────────────

  - id: series-global-popular
    tab: series
    label: popular worldwide
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: top, weight: 0.65 }
      - { addon: AIOMetadata, catalog: mdblist.105797, weight: 0.35 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: series-india-picks
    tab: series
    label: indian series
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: AIOMetadata, catalog: custom.in_rdata_indiastreams.series.atpmub, weight: 0.85 }
      - { addon: AIOMetadata, catalog: custom.in_rdata_indiastreams.series.trendingtv, weight: 0.15 }
    playability:
      pool_target: 20
      ingest_multiplier: 6

  - id: series-classics
    tab: series
    label: critically acclaimed
    type: addon_catalog
    addon: Cinemeta
    catalog: imdbRating
    content_type: series
    limit: 20
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: series-comedy
    tab: series
    label: comedy
    type: addon_catalog
    addon: AIOMetadata
    catalog: mdblist.91224
    content_type: series
    limit: 20
    playability:
      pool_target: 18
      ingest_multiplier: 6

  - id: series-miniseries
    tab: series
    label: limited series
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: AIOMetadata, catalog: mdblist.130153, weight: 0.6 }
      - { addon: AIOMetadata, catalog: mdblist.130152, weight: 0.4 }
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  - id: series-reality-casual
    tab: series
    label: reality & casual
    type: addon_catalog
    addon: AIOMetadata
    catalog: mdblist.84401
    content_type: series
    limit: 20
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  # N4 — Continue watching (disabled until library sync)
  - id: continue
    label: continue watching
    type: stremio_library
    enabled: false

