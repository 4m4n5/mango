# mango catalog rails — copy to /etc/mango/catalog.yaml on the Pi
#
# N2b: Movies | TV Shows tabs · 6 discover rails per tab.
# Curation notes: config/catalog-rail-curation.md
#
# Series yaml order: anchor rails first, optional/niche last (niche-first session allocation).
#
# Rail catalog ids must exist in addon manifests:
#   AIOMetadata — bash scripts/m4-addons/aiometadata-config.sh import …
#   Bharat Binge — config/bharat-binge-manifest.url + config/bharat-binge-rail-catalogs.json
# Mapping reference: config/aiometadata-rail-catalogs.json

version: 2

rails:
  # ── Movies tab (niche rails later in yaml → allocate session slots first) ──

  - id: movies-global-popular
    tab: movies
    label: popular worldwide
    type: composite_list
    content_type: movie
