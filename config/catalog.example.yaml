# mango catalog rails — copy to /etc/mango/catalog.yaml on the Pi
#
# N2b: Movies | TV Shows tabs · 6 predefined discover rails per tab.
# composite_list merges multiple addon catalogs per theme (weighted, deduped).
# Sources use self-hosted AIOLists plus IndiaStreams (free manifest at indiastreams.rdata.in).
#
# N3c playability defaults per enabled rail:
#   display_limit: 12        # posters served to launcher after verification
#   min_display: 8           # low-water threshold (6 for niche rails)
#   ingest_multiplier: 5     # indexer candidates = rail.limit x multiplier
#   pool_target: 20          # steady-state verified pool per rail
#
# Addon names must match /etc/mango/stremio-export.json exactly.

version: 2

rails:
  # ── Movies tab ──────────────────────────────────────────────────────────────

  - id: movies-global-popular
    tab: movies
    label: popular worldwide
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: top, weight: 0.6 }
      - { addon: Cinemeta, catalog: year, weight: 0.4 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: movies-india-trending
    tab: movies
    label: trending in india
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: IndiaStreams, catalog: trendingmovies, weight: 0.5 }
      - { addon: IndiaStreams, catalog: recmov, weight: 0.3 }
      - { addon: AIOLists, catalog: mdblist.88302, weight: 0.2 }
    playability:
      pool_target: 20
      ingest_multiplier: 6

  - id: movies-classics
    tab: movies
    label: classics & top rated
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: imdbRating, weight: 0.7 }
      - { addon: AIOLists, catalog: mdblist.83666, weight: 0.3 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: movies-comedy
    tab: movies
    label: comedy & feel-good
    type: addon_catalog
    addon: AIOLists
    catalog: mdblist.91223
    content_type: movie
    limit: 20
    playability:
      pool_target: 18
      ingest_multiplier: 6

  - id: movies-quick-watches
    tab: movies
    label: quick watches
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: AIOLists, catalog: mdblist.83668, weight: 0.7 }
      - { addon: Cinemeta, catalog: year, weight: 0.3 }
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  - id: movies-documentaries
    tab: movies
    label: documentaries
    type: addon_catalog
    addon: AIOLists
    catalog: mdblist.128051
    content_type: movie
    limit: 20
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  # ── TV Shows tab ────────────────────────────────────────────────────────────

  - id: series-global-popular
    tab: series
    label: popular worldwide
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: top, weight: 0.6 }
      - { addon: Cinemeta, catalog: year, weight: 0.4 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: series-india-picks
    tab: series
    label: indian tv picks
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: IndiaStreams, catalog: atpmub, weight: 0.6 }
      - { addon: AIOLists, catalog: mdblist.88303, weight: 0.4 }
    playability:
      pool_target: 20
      ingest_multiplier: 6

  - id: series-classics
    tab: series
    label: classics & top rated
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: imdbRating, weight: 0.7 }
      - { addon: AIOLists, catalog: mdblist.88303, weight: 0.3 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: series-comedy
    tab: series
    label: comedy & casual
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: AIOLists, catalog: mdblist.91224, weight: 0.6 }
      - { addon: AIOLists, catalog: mdblist.84401, weight: 0.4 }
    playability:
      pool_target: 18
      ingest_multiplier: 6

  - id: series-miniseries
    tab: series
    label: limited series
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: AIOLists, catalog: mdblist.130153, weight: 0.6 }
      - { addon: AIOLists, catalog: mdblist.130152, weight: 0.4 }
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  - id: series-documentaries
    tab: series
    label: documentaries
    type: addon_catalog
    addon: AIOLists
    catalog: mdblist.128052
    content_type: series
    limit: 20
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  # N4 — Continue watching (disabled until library sync)
  - id: continue
    label: continue watching
    type: stremio_library
    enabled: false
