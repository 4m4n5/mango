# mango catalog rails — copy to /etc/mango/catalog.yaml on the Pi
#
# N2b: Movies | TV Shows tabs · 6 predefined discover rails per tab.
# composite_list merges multiple addon catalogs per theme (weighted, deduped).
# Sources: Cinemeta + self-hosted AIOLists (mdblist lists). No regional catalog
# addons in N3d V1 — see docs/N3d-INVENTORY.md § Source expansion (future).
#
# N3c playability defaults per enabled rail:
#   display_limit: 12        # posters served to launcher after verification
#   min_display: 8           # low-water threshold (6 for niche rails)
#   ingest_multiplier: 5     # indexer candidates = rail.limit x multiplier
#   pool_target: 20          # steady-state verified pool per rail
#
# Addon names must match /etc/mango/stremio-export.json exactly.

version: 2

rails:
  # ── Movies tab ──────────────────────────────────────────────────────────────

  - id: movies-global-popular
    tab: movies
    label: popular worldwide
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: top, weight: 0.6 }
      - { addon: Cinemeta, catalog: year, weight: 0.4 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: movies-india-trending
    tab: movies
    label: trending in india
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: AIOLists, catalog: aiolists-88302-L, weight: 0.7 }
      - { addon: Cinemeta, catalog: year, weight: 0.3 }
    playability:
      pool_target: 20
      ingest_multiplier: 6

  - id: movies-classics
    tab: movies
    label: classics & top rated
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: Cinemeta, catalog: imdbRating, weight: 0.7 }
      - { addon: AIOLists, catalog: aiolists-83666-L, weight: 0.3 }
    playability:
      pool_target: 20
      ingest_multiplier: 4

  - id: movies-comedy
    tab: movies
    label: comedy & feel-good
    type: addon_catalog
    addon: AIOLists
    catalog: aiolists-91223-L
    content_type: movie
    limit: 20
    playability:
      pool_target: 18
      ingest_multiplier: 6

  - id: movies-quick-watches
    tab: movies
    label: quick watches
    type: composite_list
    content_type: movie
    limit: 20
    sources:
      - { addon: AIOLists, catalog: aiolists-83668-L, weight: 0.7 }
      - { addon: Cinemeta, catalog: year, weight: 0.3 }
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  - id: movies-documentaries
    tab: movies
    label: documentaries
    type: addon_catalog
    addon: AIOLists
    catalog: aiolists-128051-L
    content_type: movie
    limit: 20
    playability:
      min_display: 6
      pool_target: 15
      ingest_multiplier: 8

  # ── TV Shows tab ────────────────────────────────────────────────────────────

  - id: series-global-popular
