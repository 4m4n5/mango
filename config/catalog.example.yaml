# mango catalog rails — copy to /etc/mango/catalog.yaml on the Pi
#
# N2: five rails from TWO addon sources (smoke breadth before full catalog mgmt).
# Addon names must match /etc/mango/stremio-export.json exactly.
#
# Later: auto-import all AIOMetadata catalogs (~31), reorder UI, enable/disable per rail.

version: 1

rails:
  # --- AIOMetadata | ElfHosted (India / regional) ---
  - id: trending-india
    label: trending in india
    type: addon_catalog
    addon: "AIOMetadata  | ElfHosted"
    catalog: custom.in_rdata_indiastreams.movie.trendingmovies
    content_type: movie
    limit: 20

  - id: popular-india
    label: trending movies
    type: addon_catalog
    addon: "AIOMetadata  | ElfHosted"
    catalog: mdblist.88302
    content_type: movie
    limit: 20

  - id: recommended-india
    label: recommended indian movies
    type: addon_catalog
    addon: "AIOMetadata  | ElfHosted"
    catalog: custom.in_rdata_indiastreams.movie.recmov
    content_type: movie
    limit: 20

  # --- Cinemeta (global discover) ---
  - id: popular-global
    label: popular
    type: addon_catalog
    addon: Cinemeta
    catalog: top
    content_type: movie
    limit: 20

  - id: featured-global
    label: featured
    type: addon_catalog
    addon: Cinemeta
    catalog: imdbRating
    content_type: movie
    limit: 20

  # N4 — Continue watching (disabled for N2 gate)
  - id: continue
    label: continue watching
    type: stremio_library
    enabled: false
