# mango catalog rails — copy to /etc/mango/catalog.yaml on the Pi
#
# N2: five rails from TWO addon sources (smoke breadth before full catalog mgmt).
# Addon names must match /etc/mango/stremio-export.json exactly.
#
# N3c playability defaults per enabled rail:
#   display_limit: 12        # posters served to launcher after verification
#   min_display: 8           # low-water threshold
#   ingest_multiplier: 5     # indexer candidates = rail.limit x multiplier
#   pool_target: 60          # steady-state target after wider source ingestion
#
# Current Pi bootstrap target is 20 per rail. N3c-S2 measured trending-india at
# 24 verified titles from its 97-title upstream page, so 60 is not reachable
# for that rail until N3c adds wider/fallback sources.
#
# Later: auto-import all AIOMetadata catalogs (~31), reorder UI, enable/disable per rail.

version: 1

rails:
  # --- AIOMetadata | ElfHosted (India / regional) ---
  - id: trending-india
    label: trending in india
    type: addon_catalog
    addon: "AIOMetadata  | ElfHosted"
    catalog: custom.in_rdata_indiastreams.movie.trendingmovies
    content_type: movie
    limit: 20
    playability:
      pool_target: 20

  - id: popular-india
    label: trending movies
    type: addon_catalog
    addon: "AIOMetadata  | ElfHosted"
    catalog: mdblist.88302
    content_type: movie
    limit: 20
    playability:
      pool_target: 20

  - id: recommended-india
    label: recommended indian movies
    type: addon_catalog
    addon: "AIOMetadata  | ElfHosted"
    catalog: custom.in_rdata_indiastreams.movie.recmov
    content_type: movie
    limit: 20
    playability:
      pool_target: 20

  # --- Cinemeta (global discover) ---
  - id: popular-global
    label: popular
    type: addon_catalog
    addon: Cinemeta
    catalog: top
    content_type: movie
    limit: 20
    playability:
      pool_target: 20

  - id: featured-global
    label: featured
    type: addon_catalog
    addon: Cinemeta
    catalog: imdbRating
    content_type: movie
    limit: 20
    playability:
      pool_target: 20

  # N4 — Continue watching (disabled for N2 gate)
  - id: continue
    label: continue watching
    type: stremio_library
    enabled: false
