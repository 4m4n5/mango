      pool_target: 20
      ingest_multiplier: 4

  - id: series-india-picks
    tab: series
    label: indian tv picks
    type: composite_list
    content_type: series
    limit: 20
    sources:
      - { addon: AIOLists, catalog: aiolists-88303-L, weight: 0.7 }
      - { addon: Cinemeta, catalog: year, weight: 0.3 }
    playability:
      pool_target: 20
      ingest_multiplier: 6

  - id: series-classics
    tab: series
